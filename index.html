<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ON1X PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at 0% 0%, #1e1e2f 0%, #0a0a0c 50%, #1a0b2e 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            overflow: hidden;
        }

        /* Размываем только карточку с ID, основной текст оставляем четким */
        .glass-card {
            filter: blur(5px);
            opacity: 0.5;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px; height: 300px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            filter: blur(80px);
            border-radius: 50%;
            top: 10%; right: -50px;
            opacity: 0.4;
            z-index: 0;
        }

        .header { display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: 1px; color: #fff; }
        .status-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 10px #ef4444; margin-right: 8px; }
        .status-wrap { display: flex; align-items: center; font-size: 12px; font-weight: 700; color: #aaa; }

        .content { z-index: 10; margin-top: 40px; }
        .title { font-size: 38px; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
        .title span { background: linear-gradient(90deg, #6366f1, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .desc { font-size: 15px; color: #fff; line-height: 1.5; margin-bottom: 35px; font-weight: 700; }

        .card-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card-id { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        .footer { z-index: 10; margin-bottom: 10px; }

        .btn {
            display: block;
            text-align: center;
            text-decoration: none;
            width: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: #fff;
            border: none;
            padding: 22px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ON1X</div>
        <div class="status-wrap"><div class="status-dot"></div> <span id="status-txt">ЗАВЕРШЕН</span></div>
    </div>

    <div class="content">
        <h1 class="title">РОЗЫГРЫШ<br><span>ЗАВЕРШЕН</span></h1>
        <p class="desc">Следите за новостями в нашем канале</p>
        <div class="glass-card">
            <div class="card-label">Твой цифровой ID</div>
            <div class="card-id" id="user-id">ОПРЕДЕЛЕНИЕ...</div>
        </div>
    </div>

    <div class="footer">
        <a href="https://t.me/ON1Xvpn" class="btn">Подписаться на канал</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-id').textContent = user.id;
        }
    </script>
</body>
</html>
